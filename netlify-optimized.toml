[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_ENV = "production"
  NODE_VERSION = "18"
  NEXT_USE_NETLIFY_EDGE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Configuración de funciones
[functions]
  node_bundler = "nft"
  directory = "netlify/functions"

# Edge Functions para API routes
[[edge_functions]]
  path = "/api/*"
  function = "api-edge"

# Configuración para optimizar assets estáticos con caché largo
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    CDN-Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Headers para API con caché corto
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, s-maxage=60, stale-while-revalidate=300"
    CDN-Cache-Control = "public, s-maxage=300"

# Optimización para imágenes con Netlify Image CDN
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Configuración para videos
[[headers]]
  for = "*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Configuración de imágenes remotas
[images]
  remote_images = ["https://lrsmmfpsbawznjpnllwr.supabase.co/*"]

# Redirecciones para API optimizada
[[redirects]]
  from = "/api/products/:id"
  to = "/.netlify/functions/product-detail?id=:id"
  status = 200
  force = true

# Configuración de ISR (Incremental Static Regeneration)
[[redirects]]
  from = "/shop/*"
  to = "/.netlify/builders/shop"
  status = 200

# Configuración para PWA
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json"

# Seguridad mejorada
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"